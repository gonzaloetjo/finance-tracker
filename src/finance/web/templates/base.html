<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ request.app.state.finance.csrf_token }}">
  <title>{% block title %}finance{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body class="bg-neutral-50 text-neutral-900">
  <header class="border-b bg-white">
    <nav class="{% block nav_width %}max-w-7xl{% endblock %} mx-auto px-4 py-3 flex flex-wrap gap-x-6 gap-y-2 text-sm items-center">
      <a href="/" class="font-semibold">finance</a>
      <span class="muted">·</span>
      <a href="/merchants"     class="text-neutral-600 hover:text-neutral-900">Merchants</a>
      <a href="/merchants?uncategorized=true&spend_only=true&top=50"
         class="text-amber-700 hover:text-amber-900 font-medium">Uncategorized</a>
      <a href="/subscriptions" class="text-neutral-600 hover:text-neutral-900">Subscriptions</a>
      <a href="/recurring"     class="text-neutral-600 hover:text-neutral-900">Recurring</a>
      <a href="/forecast"      class="text-neutral-600 hover:text-neutral-900">Forecast</a>
      <a href="/alerts"        class="text-neutral-600 hover:text-neutral-900">Alerts</a>
      <a href="/advice"        class="text-neutral-600 hover:text-neutral-900">Advice</a>
      <span class="muted">·</span>
      <a href="/transactions"  class="text-neutral-600 hover:text-neutral-900">Transactions</a>
      <a href="/accounts"      class="text-neutral-600 hover:text-neutral-900">Accounts</a>
      <a href="/rules"         class="text-neutral-600 hover:text-neutral-900">Rules</a>
      <a href="/settings"      class="text-neutral-600 hover:text-neutral-900">Settings</a>
      <a href="/connect"       class="text-neutral-600 hover:text-neutral-900">Connect</a>
    </nav>
  </header>
  <main class="{% block layout_width %}max-w-7xl{% endblock %} mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
