name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync deps
        run: uv sync --frozen
      - name: pytest
        run: uv run pytest -q
      - name: ruff check
        run: uv run ruff check .
      - name: mypy
        run: uv run mypy src/finance
      - name: vulture
        run: uv run vulture src/finance --min-confidence 80
      - name: pip-audit
        run: uv run pip-audit --skip-editable
